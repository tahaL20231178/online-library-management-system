{% extends 'base.html' %}
{% block title %}{{ _('Login') }}{% endblock %}
{% block content %}
<div style="min-height:80vh; display:flex; align-items:center; justify-content:center;">
    <div style="width:100%; max-width:400px;">
        <div style="text-align:center; margin-bottom:32px;">
            <div style="font-size:2rem; margin-bottom:8px;">📚</div>
            <h2 style="font-size:1.5rem; font-weight:700;">{{ _('Sign in to LibraryMS') }}</h2>
            <p style="color:var(--text-muted); font-size:0.9rem;">{{ _('Enter your credentials to continue') }}</p>
        </div>
        <div style="background:var(--bg-card); border:1px solid var(--border); border-radius:12px; padding:28px;">
            <form method="POST" class="dark-form">
                <div class="mb-3">
                    <label class="form-label">{{ _('Email Address') }}</label>
                    <input type="email" name="email" class="form-control"
                           placeholder="you@example.com" required autofocus>
                </div>
                <div class="mb-4">
                    <label class="form-label">{{ _('Password') }}</label>
                    <input type="password" name="password" class="form-control"
                           placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-accent" style="width:100%; justify-content:center; padding:10px;">
                    <i class="bi bi-box-arrow-in-right"></i> {{ _('Sign In') }}
                </button>
            </form>
        </div>
        <p style="text-align:center; margin-top:16px; color:var(--text-muted); font-size:0.85rem;">
            {{ _("Don't have an account?") }}
            <a href="{{ url_for('auth.register') }}" style="color:var(--accent); text-decoration:none;">{{ _('Register here') }}</a>
        </p>
    </div>
</div>
{% endblock %}
