{% extends 'base.html' %}
{% block title %}{{ _('Edit Book') }}{% endblock %}
{% block content %}
<div class="page-header">
    <h2>{{ _('Edit Book') }}</h2>
    <p>{{ _('Update book information in the catalog.') }}</p>
</div>
<div style="max-width:560px;">
    <div style="background:var(--bg-card); border:1px solid var(--border); border-radius:12px; padding:28px;">
        <form method="POST" class="dark-form">
            <div class="mb-3">
                <label class="form-label">{{ _('Title') }}</label>
                <input type="text" name="title" class="form-control" value="{{ book.title }}" required>
            </div>
            <div class="mb-3">
                <label class="form-label">{{ _('Author') }}</label>
                <input type="text" name="author" class="form-control" value="{{ book.author }}" required>
            </div>
            <div class="mb-3">
                <label class="form-label">{{ _('ISBN (read-only)') }}</label>
                <input type="text" class="form-control" value="{{ book.isbn }}" disabled
                       style="opacity:0.5; cursor:not-allowed;">
            </div>
            <div class="mb-3">
                <label class="form-label">{{ _('Category') }}</label>
                <select name="category" class="form-select">
                    <option value="">{{ _('-- Select Category --') }}</option>
                    <option {% if book.category == 'Fiction' %}selected{% endif %}>Fiction</option>
                    <option {% if book.category == 'Non-Fiction' %}selected{% endif %}>Non-Fiction</option>
                    <option {% if book.category == 'Science Fiction' %}selected{% endif %}>Science Fiction</option>
                    <option {% if book.category == 'Fantasy' %}selected{% endif %}>Fantasy</option>
                    <option {% if book.category == 'Mystery' %}selected{% endif %}>Mystery</option>
                    <option {% if book.category == 'Thriller' %}selected{% endif %}>Thriller</option>
                    <option {% if book.category == 'Romance' %}selected{% endif %}>Romance</option>
                    <option {% if book.category == 'Horror' %}selected{% endif %}>Horror</option>
                    <option {% if book.category == 'Biography' %}selected{% endif %}>Biography</option>
                    <option {% if book.category == 'Autobiography' %}selected{% endif %}>Autobiography</option>
                    <option {% if book.category == 'History' %}selected{% endif %}>History</option>
                    <option {% if book.category == 'Science' %}selected{% endif %}>Science</option>
                    <option {% if book.category == 'Technology' %}selected{% endif %}>Technology</option>
                    <option {% if book.category == 'Mathematics' %}selected{% endif %}>Mathematics</option>
                    <option {% if book.category == 'Philosophy' %}selected{% endif %}>Philosophy</option>
                    <option {% if book.category == 'Psychology' %}selected{% endif %}>Psychology</option>
                    <option {% if book.category == 'Self-Help' %}selected{% endif %}>Self-Help</option>
                    <option {% if book.category == 'Business' %}selected{% endif %}>Business</option>
                    <option {% if book.category == 'Economics' %}selected{% endif %}>Economics</option>
                    <option {% if book.category == 'Politics' %}selected{% endif %}>Politics</option>
                    <option {% if book.category == 'Law' %}selected{% endif %}>Law</option>
                    <option {% if book.category == 'Medicine' %}selected{% endif %}>Medicine</option>
                    <option {% if book.category == 'Art' %}selected{% endif %}>Art</option>
                    <option {% if book.category == 'Music' %}selected{% endif %}>Music</option>
                    <option {% if book.category == 'Poetry' %}selected{% endif %}>Poetry</option>
                    <option {% if book.category == 'Drama' %}selected{% endif %}>Drama</option>
                    <option {% if book.category == 'Children' %}selected{% endif %}>Children</option>
                    <option {% if book.category == 'Young Adult' %}selected{% endif %}>Young Adult</option>
                    <option {% if book.category == 'Travel' %}selected{% endif %}>Travel</option>
                    <option {% if book.category == 'Religion' %}selected{% endif %}>Religion</option>
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">{{ _('Cover Image URL') }}</label>
                <input type="text" name="cover_image" class="form-control"
                       value="{{ book.cover_image or '' }}"
                       placeholder="https://covers.openlibrary.org/...">
            </div>
            <div class="mb-4">
                <label class="form-label">{{ _('Total Copies') }}</label>
                <input type="number" name="total_copies" class="form-control"
                       value="{{ book.total_copies }}" min="1" required>
            </div>
            <div style="display:flex; gap:10px;">
                <button type="submit" class="btn-accent">
                    <i class="bi bi-check-circle"></i> {{ _('Update Book') }}
                </button>
                <a href="{{ url_for('admin.books') }}" class="btn-ghost">{{ _('Cancel') }}</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
